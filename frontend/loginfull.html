<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager - Login</title>
    
    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* ============================================
           LOGIN CONTAINER
           ============================================ */
        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-box {
            background: white;
            border-radius: 15px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           LOGIN HEADER
           ============================================ */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #777;
            font-size: 14px;
        }

        /* ============================================
           INPUT GROUPS
           ============================================ */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* ============================================
           LOGIN OPTIONS
           ============================================ */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #555;
            font-size: 14px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* ============================================
           LOGIN BUTTON
           ============================================ */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================
           DUMMY CREDENTIALS
           ============================================ */
        .dummy-credentials {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .dummy-credentials p {
            color: #555;
            font-size: 13px;
            margin: 3px 0;
        }

        .dummy-credentials span {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .dummy-credentials span:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* ============================================
           SIGNUP LINK
           ============================================ */
        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* ============================================
           MESSAGE STYLES
           ============================================ */
        .error-message {
            background: #fee;
            color: #c0392b;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #c0392b;
            font-size: 14px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #2e7d32;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           LOADING SPINNER
           ============================================ */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
            
            .login-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        /* ============================================
           PASSWORD VISIBILITY TOGGLE
           ============================================ */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        /* ============================================
           LOGIN HEADER ICON
           ============================================ */
        .login-header .icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <!-- ============================================ -->
    <!-- LOGIN CONTAINER                              -->
    <!-- ============================================ -->
    <div class="login-container">
        <div class="login-box">
            
            <!-- Login Header -->
            <div class="login-header">
                <span class="icon">📚</span>
                <h1>Student Task Manager</h1>
                <p>Manage your tasks efficiently</p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                
                <!-- Username -->
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autofocus>
                </div>
                
                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" id="togglePassword" title="Toggle password visibility">
                            👁️
                        </button>
                    </div>
                </div>
                
                <!-- Options -->
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword">Forgot Password?</a>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="login-btn" id="loginBtn">Login</button>
            </form>
            
            <!-- Dummy Credentials -->
            <div class="dummy-credentials">
                <p><strong>🔑 Quick Login:</strong></p>
                <p>
                    👤 <span class="cred-username" data-username="student" data-password="student123">student</span> 
                    | 🔐 <span class="cred-password" data-username="student" data-password="student123">student123</span>
                </p>
                <p>
                    👤 <span class="cred-username" data-username="teacher" data-password="teacher123">teacher</span> 
                    | 🔐 <span class="cred-password" data-username="teacher" data-password="teacher123">teacher123</span>
                </p>
                <p>
                    👤 <span class="cred-username" data-username="admin" data-password="admin123">admin</span> 
                    | 🔐 <span class="cred-password" data-username="admin" data-password="admin123">admin123</span>
                </p>
            </div>
            
            <!-- Sign Up Link -->
            <div class="signup-link">
                Don't have an account? <a href="#" id="signupLink">Sign up</a>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- JAVASCRIPT                                   -->
    <!-- ============================================ -->
    <script>
        // ============================================
        // DUMMY USER DATA
        // ============================================
        const DUMMY_USERS = [
            { username: 'student', password: 'student123', role: 'student', name: 'Student User' },
            { username: 'teacher', password: 'teacher123', role: 'teacher', name: 'Teacher User' },
            { username: 'admin', password: 'admin123', role: 'admin', name: 'Admin User' }
        ];

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const rememberMe = document.getElementById('rememberMe');
        const togglePassword = document.getElementById('togglePassword');

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showMessage(message, type) {
            // Remove existing messages
            const existingError = document.querySelector('.error-message');
            const existingSuccess = document.querySelector('.success-message');
            if (existingError) existingError.remove();
            if (existingSuccess) existingSuccess.remove();
            
            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'error' ? 'error-message show' : 'success-message show';
            messageDiv.textContent = message;
            
            // Insert message after the form
            const form = document.getElementById('loginForm');
            form.parentNode.insertBefore(messageDiv, form);
            
            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.classList.remove('show');
                    setTimeout(() => messageDiv.remove(), 300);
                }, 5000);
            }
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            } else {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
            }
        }

        function fillCredentials(username, password) {
            usernameInput.value = username;
            passwordInput.value = password;
            // Trigger focus effect
            usernameInput.focus();
            usernameInput.style.borderColor = '#667eea';
            setTimeout(() => {
                usernameInput.style.borderColor = '';
            }, 1000);
        }

        // ============================================
        // LOGIN HANDLER
        // ============================================
        function handleLogin(event) {
            event.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const remember = rememberMe.checked;
            
            // Validate input
            if (!username || !password) {
                showMessage('Please enter both username and password', 'error');
                if (!username) usernameInput.focus();
                else passwordInput.focus();
                return;
            }
            
            // Show loading state
            setLoading(true);
            
            // Simulate network delay
            setTimeout(() => {
                // Check credentials against dummy users
                const user = DUMMY_USERS.find(u => 
                    u.username.toLowerCase() === username.toLowerCase() && 
                    u.password === password
                );
                
                if (user) {
                    // Successful login
                    showMessage(`✅ Welcome ${user.name}! Redirecting to dashboard...`, 'success');
                    
                    // Store user info
                    const storage = remember ? localStorage : sessionStorage;
                    storage.setItem('currentUser', JSON.stringify(user));
                    storage.setItem('isLoggedIn', 'true');
                    storage.setItem('loginTime', new Date().toISOString());
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    // Failed login
                    showMessage('❌ Invalid username or password. Please try again.', 'error');
                    passwordInput.value = '';
                    passwordInput.focus();
                    setLoading(false);
                }
            }, 800);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            const storage = localStorage.getItem('isLoggedIn') === 'true' ? localStorage : 
                            sessionStorage.getItem('isLoggedIn') === 'true' ? sessionStorage : null;
            
            if (storage) {
                const user = JSON.parse(storage.getItem('currentUser'));
                if (user) {
                    // Auto-redirect to dashboard
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            
            // Focus username field
            usernameInput.focus();
            
            // Password visibility toggle
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
            });
            
            // Click on dummy credentials - username
            document.querySelectorAll('.cred-username').forEach(el => {
                el.addEventListener('click', function() {
                    const username = this.dataset.username;
                    const password = this.dataset.password;
                    fillCredentials(username, password);
                });
            });
            
            // Click on dummy credentials - password
            document.querySelectorAll('.cred-password').forEach(el => {
                el.addEventListener('click', function() {
                    const username = this.dataset.username;
                    const password = this.dataset.password;
                    fillCredentials(username, password);
                });
            });
            
            // Forgot password
            document.getElementById('forgotPassword').addEventListener('click', function(e) {
                e.preventDefault();
                showMessage('📧 Please contact your administrator to reset your password.', 'error');
            });
            
            // Sign up link
            document.getElementById('signupLink').addEventListener('click', function(e) {
                e.preventDefault();
                showMessage('📝 Registration feature coming soon!', 'error');
            });
            
            // Enter key support for form submission
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    const active = document.activeElement;
                    if (active === usernameInput || active === passwordInput) {
                        loginForm.dispatchEvent(new Event('submit'));
                    }
                }
            });
            
            // Auto-dismiss error messages after 5 seconds
            setInterval(() => {
                const errorMsg = document.querySelector('.error-message');
                if (errorMsg && errorMsg.classList.contains('show')) {
                    setTimeout(() => {
                        errorMsg.classList.remove('show');
                        setTimeout(() => errorMsg.remove(), 300);
                    }, 5000);
                }
            }, 1000);
            
            // Add nice hover effect to credential spans
            document.querySelectorAll('.dummy-credentials span').forEach(span => {
                span.title = 'Click to auto-fill';
            });
        });

        // ============================================
        // EXPOSE FUNCTIONS TO GLOBAL SCOPE
        // ============================================
        window.handleLogin = handleLogin;
        window.fillCredentials = fillCredentials;
        window.showMessage = showMessage;

        // ============================================
        // CONSOLE HELP
        // ============================================
        console.log('%c📚 Student Task Manager Login', 'font-size: 20px; font-weight: bold;');
        console.log('%c🔑 Dummy Credentials:', 'font-weight: bold;');
        console.log('  👤 student / 🔐 student123');
        console.log('  👤 teacher / 🔐 teacher123');
        console.log('  👤 admin   / 🔐 admin123');
        console.log('%c💡 Click on any credential in the form to auto-fill!', 'color: #667eea;');
    </script>
</body>
</html>
